<style>
:root {
  --bg: #f8f9fa; --surface: #ffffff; --surface-hover: #f1f3f5;
  --border: #dee2e6; --text: #212529; --text-secondary: #495057; --text-muted: #868e96;
  --accent: #228be6; --success: #2b8a3e; --danger: #c92a2a; --warning: #e67700;
  --purple: #7048e8; --orange: #d9480f;
  --accent-bg: #e7f5ff;
}

/* Dark theme — enterprise slate */
[data-theme="dark"] {
  --bg: #1a1b1e; --surface: #25262b; --surface-hover: #2c2e33;
  --border: #373a40; --text: #c1c2c5; --text-secondary: #909296; --text-muted: #5c5f66;
  --accent: #4dabf7; --success: #51cf66; --danger: #ff6b6b; --warning: #fcc419;
  --purple: #b197fc; --orange: #ff922b;
  --accent-bg: #1c3a5c;
}

/* Gray theme — enterprise charcoal */
[data-theme="gray"] {
  --bg: #2b2c30; --surface: #35363a; --surface-hover: #3e3f44;
  --border: #4a4b50; --text: #d4d4d8; --text-secondary: #a1a1aa; --text-muted: #71717a;
  --accent: #60a5fa; --success: #6ee7b7; --danger: #fca5a5; --warning: #fcd34d;
  --purple: #c4b5fd; --orange: #fdba74;
  --accent-bg: #2d3a4f;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { overflow: hidden; margin: 0; padding: 0; scrollbar-gutter: auto; }

/* Scrollbar — VSCode style */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 0; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
::-webkit-scrollbar-corner { background: transparent; }
[data-theme="dark"] ::-webkit-scrollbar-thumb { background: #4a4b50; }
[data-theme="dark"] ::-webkit-scrollbar-thumb:hover { background: #6c6d73; }
[data-theme="gray"] ::-webkit-scrollbar-thumb { background: #505055; }
[data-theme="gray"] ::-webkit-scrollbar-thumb:hover { background: #707077; }

body {
  font-family: 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh;
  font-size: 13px; scrollbar-color: var(--border) transparent; scrollbar-width: thin;
  font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  overflow: hidden; margin: 0; padding: 0; scrollbar-gutter: auto;
}

/* Header */
.header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 20px; display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 100; height: 40px;
}
.header h1 { font-size: 13px; font-weight: 600; white-space: nowrap; letter-spacing: -0.3px; color: var(--text); }
.header h1 .logo-mark { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; margin-right: 8px; vertical-align: middle; }
.header-right { margin-left: auto; display: flex; gap: 6px; align-items: center; }
.btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; font-size: 12px; font-weight: 500;
  border: 1px solid var(--border); border-radius: 2px;
  background: var(--surface); color: var(--text); text-decoration: none;
  cursor: pointer; transition: all 0.1s;
}
.btn:hover { background: var(--surface-hover); }

/* Theme Selector */
.theme-selector {
  display: flex; border: 1px solid var(--border); border-radius: 0; overflow: hidden;
}
.lang-selector {
  display: flex; border: 1px solid var(--border); border-radius: 0; overflow: hidden; margin-right: 8px;
}
.lang-btn {
  padding: 3px 8px; font-size: 11px; border: none; border-right: 1px solid var(--border);
  background: var(--surface); color: var(--text-secondary); cursor: pointer; transition: all 0.1s;
}
.lang-btn:last-child { border-right: none; }
.lang-btn:hover { background: var(--surface-hover); }
.lang-btn.active { background: var(--accent); color: #fff; }
.theme-btn {
  padding: 3px 8px; font-size: 11px; border: none; cursor: pointer;
  background: var(--surface); color: var(--text-secondary); transition: all 0.1s;
  border-right: 1px solid var(--border); line-height: 1; font-weight: 500;
}
.theme-btn:last-child { border-right: none; }
.theme-btn:hover { background: var(--surface-hover); }
.theme-btn.active { background: var(--accent); color: #fff; }

/* Main */
/* Main */

/* Stats Bar */
.stats-bar {
  display: flex; gap: 0; margin-bottom: 8px; align-items: stretch;
  border: 1px solid var(--border); border-radius: 4px; overflow: hidden;
  background: var(--surface); font-size: 12px;
}
.stat {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 14px; font-weight: 400; color: var(--text-secondary);
  border-right: 1px solid var(--border); cursor: default;
  transition: background 0.1s;
}
.stat:last-of-type { border-right: none; }
.stat:hover { background: var(--surface-hover); }
.stat-dot {
  width: 7px; height: 7px; border-radius: 50%;
}
.stat-dot.blue { background: var(--accent); }
.stat-dot.yellow { background: var(--warning); }
.stat-dot.green { background: var(--success); }
.stat-count { font-weight: 600; color: var(--text); }

/* Toggle switch */
.toggle-wrap {
  display: flex; align-items: center; gap: 6px; margin-left: auto;
  padding: 6px 12px;
  font-size: 11px; color: var(--text-muted); user-select: none; cursor: pointer;
}
.toggle-track {
  width: 26px; height: 14px; border-radius: 7px; background: var(--border);
  position: relative; transition: background 0.15s;
}
.toggle-track.on { background: var(--accent); }
.toggle-knob {
  width: 10px; height: 10px; border-radius: 50%; background: #fff;
  position: absolute; top: 2px; left: 2px; transition: left 0.15s;
  box-shadow: 0 1px 2px rgba(0,0,0,0.15);
}
.toggle-track.on .toggle-knob { left: 14px; }

/* Polling interval selector */
.poll-ctrl {
  display: flex; align-items: center; gap: 2px; margin-left: 4px;
  padding-left: 8px; border-left: 1px solid var(--border);
}
.poll-btn {
  padding: 2px 6px; font-size: 11px; border: 1px solid var(--border);
  border-radius: 0; cursor: pointer; background: var(--surface);
  color: var(--text-secondary); transition: all 0.1s;
}
.poll-btn:hover { border-color: var(--accent); color: var(--accent); }
.poll-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ─── Session Tree List ─── */
.session-tree {
  background: var(--surface); border: 1px solid var(--border); border-radius: 0;
  overflow: hidden;
}

/* Project group header */
.st-group {
  border-bottom: 1px solid var(--border);
}
.st-group:last-child { border-bottom: none; }
.st-group-header {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px; cursor: pointer; user-select: none;
  transition: background 0.1s;
}
.st-group-header:hover { background: var(--surface-hover); }
.st-group-toggle {
  font-size: 10px; color: var(--text-muted); width: 14px; text-align: center;
  transition: transform 0.1s;
}
.st-group.collapsed .st-group-toggle { transform: rotate(-90deg); }
.st-group-icon { font-size: 14px; }
.st-group-name {
  font-size: 12px; font-weight: 600; color: var(--text);
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.st-group-badges {
  display: flex; gap: 4px; align-items: center; flex-shrink: 0;
}
.st-group-badge {
  font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 2px;
}
.st-group-badge.working { background: var(--accent-bg); color: var(--accent); }
.st-group-badge.idle { background: #dafbe1; color: var(--success); }
.st-group-badge.count { background: var(--bg); color: var(--text-secondary); border: 1px solid var(--border); }

.st-group-body { }
.st-group.collapsed .st-group-body { display: none; }

/* Session row */
.st-row {
  display: flex; align-items: center; gap: 0;
  padding: 2px 12px 2px 32px; border-top: 1px solid var(--border);
  cursor: pointer; transition: background 0.1s; min-height: 32px;
}
.st-row:hover { background: var(--surface-hover); }
.st-row.selected { background: var(--surface-hover); border-left: 2px solid var(--accent); padding-left: 30px; }

.dot {
  width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0;
}
.dot.working { background: var(--accent); animation: breathe 1.5s ease-in-out infinite; }
.dot.waiting { background: var(--warning); animation: breathe 2s ease-in-out infinite; }
.dot.idle { background: var(--success); }
.dot.completed { background: var(--text-muted); }
.dot.unknown { background: var(--text-muted); opacity: 0.5; }

@keyframes breathe {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.3); opacity: 0.6; }
}

.st-col-status { width: 20px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.st-col-summary {
  width: 200px; flex-shrink: 0; font-size: 12px; font-weight: 500; color: var(--text);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 8px;
}
.st-col-intent {
  font-size: 11px; color: var(--accent); font-weight: 400;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  margin-left: 4px;
}
.st-col-memo {
  width: 140px; flex-shrink: 0; font-size: 11px; color: var(--text-secondary);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 8px;
}
.st-col-lastmsg {
  flex: 1; min-width: 0; font-size: 11px; color: var(--text-secondary);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 8px;
}
.st-col-turns, .st-col-tokens {
  width: 56px; flex-shrink: 0; font-size: 11px; color: var(--text-muted);
  text-align: right; white-space: nowrap; padding-right: 8px;
}
.st-col-time {
  width: 64px; flex-shrink: 0; font-size: 11px; color: var(--text-muted);
  text-align: right; white-space: nowrap;
}

/* Table header */
.st-header {
  display: flex; align-items: center; gap: 0;
  padding: 4px 12px 4px 32px; background: var(--bg);
  border-bottom: 1px solid var(--border); font-size: 10px;
  font-weight: 600; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.5px; position: relative;
}
.st-header > div { position: relative; border-right: 1px solid var(--border); padding: 0 12px; }
.st-header > div:last-child { border-right: none; }
.st-header > div:first-child { padding-left: 0; }
.col-resize-handle {
  position: absolute; right: -2px; top: 0; width: 5px; height: 100%;
  cursor: col-resize; z-index: 10;
}
.col-resize-handle:hover, .col-resize-handle.dragging {
  background: var(--accent); opacity: 0.6;
}

/* Inactive section */
.st-inactive-header {
  padding: 6px 12px; cursor: pointer; user-select: none;
  display: flex; align-items: center; gap: 6px;
  border-top: 1px solid var(--border); font-size: 12px; font-weight: 600;
  color: var(--text-muted); transition: background 0.1s;
}
.st-inactive-header:hover { background: var(--surface-hover); }

/* VSCode launch buttons */
.vscode-btn {
  padding: 4px 10px; font-size: 11px; border: 1px solid var(--border);
  border-radius: 2px; cursor: pointer; background: var(--surface);
  color: var(--text-secondary); transition: all 0.1s; line-height: 1;
  white-space: nowrap; display: inline-flex; align-items: center; gap: 6px;
}
.vscode-btn:hover { background: #007ACC; color: #fff; border-color: #007ACC; }
.vscode-btn:hover svg path { fill: #fff; }
.vscode-btn.insiders:hover { background: #24903e; color: #fff; border-color: #24903e; }
.vscode-btn.insiders:hover svg path { fill: #fff; }
.dp-vscode-row { display: flex; gap: 8px; margin: 8px 0 4px; }

.empty-state {
  text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px;
}
.empty-state .empty-icon { font-size: 14px; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

/* ─── Right Detail Panel ─── */
/* Split pane container */
.split-container {
  display: flex; height: calc(100vh - 41px); overflow: hidden;
}
.split-left {
  flex: 7; min-width: 300px; overflow-y: auto; padding: 12px 16px;
}
.split-divider {
  width: 4px; background: var(--border); cursor: col-resize; flex-shrink: 0;
  transition: background 0.1s; display: none;
}
.split-divider:hover, .split-divider.dragging { background: var(--accent); }
.split-container.has-detail .split-divider { display: block; }
.split-right {
  flex: 0; min-width: 0; overflow: hidden;
  background: var(--surface); border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  transition: flex 0.2s ease, opacity 0.2s ease;
  opacity: 0;
}
.split-container.has-detail .split-right { flex: 3; min-width: 280px; opacity: 1; }
.split-container.has-agent-detail .split-left { display: none; }
.split-container.has-agent-detail .split-divider { display: none; }
.split-container.has-agent-detail .split-right { flex: 3; min-width: 200px; opacity: 1; }
.split-container.has-agent-detail .agent-panel {
  display: flex; flex-direction: column; flex: 7; min-width: 300px;
  border-left: 1px solid var(--border);
  animation: panelSlideIn 0.2s ease;
}
.agent-panel { display: none; background: var(--surface); }
@keyframes panelSlideIn {
  from { opacity: 0; transform: translateX(12px); }
  to { opacity: 1; transform: translateX(0); }
}
.agent-panel-header {
  padding: 8px 12px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg); flex-shrink: 0; position: relative;
}
.agent-panel-header h2 { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.turn-back-btn {
  font-size: 11px; padding: 2px 8px; border: 1px solid var(--border);
  border-radius: 3px; background: var(--surface); color: var(--text-secondary);
  cursor: pointer; transition: all 0.15s;
}
.turn-back-btn:hover { border-color: var(--accent); color: var(--accent); }
.agent-panel-body { flex: 1; overflow-y: auto; padding: 0; animation: contentFadeIn 0.15s ease; }
@keyframes contentFadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.agent-type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px; }
.agent-type-card {
  border: 1px solid var(--border); border-radius: 4px; padding: 12px;
  cursor: pointer; transition: all 0.15s;
}
.agent-type-card:hover { background: var(--surface-hover); }
.agent-type-card.selected { border-color: var(--accent); background: var(--accent-bg); }
.agent-card-icon { font-size: 12px; margin-bottom: 4px; display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; background: var(--bg); border: 1px solid var(--border); border-radius: 50%; font-weight: 700; color: var(--accent); }
.agent-card-name { font-weight: 600; font-size: 13px; color: var(--text); }
.agent-card-count { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.agent-card-desc { font-size: 11px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 2px; }
.agent-card-stats { font-size: 10px; margin-top: 4px; }
.agent-stat-success { color: var(--success); }
.agent-stat-failed { color: var(--danger); margin-left: 6px; }

/* ─── Agent Detail Card (redesigned) ─── */
.agent-detail-card {
  margin-top: 6px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; font-size: 11px; line-height: 1.5; overflow: hidden;
}
.agent-detail-header {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 10px; border-bottom: 1px solid var(--border);
  background: var(--surface); font-weight: 600; font-size: 12px;
}
.agent-detail-header .agent-status-badge {
  font-size: 10px; padding: 1px 6px; border-radius: 2px; font-weight: 500;
}
.agent-status-badge.done { background: var(--success); color: #fff; }
.agent-status-badge.failed { background: var(--danger); color: #fff; }
.agent-status-badge.running { background: var(--accent); color: #fff; }
.agent-detail-header .agent-duration { color: var(--text-muted); font-weight: 400; font-size: 10px; margin-left: auto; }
.agent-detail-section {
  padding: 6px 10px; border-bottom: 1px solid var(--border);
}
.agent-detail-section:last-child { border-bottom: none; }
.agent-detail-section-label {
  font-size: 10px; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 4px;
  display: flex; align-items: center; gap: 4px;
}
.agent-collapsible {
  max-height: 4.5em; overflow: hidden; cursor: pointer; position: relative;
  white-space: pre-wrap; color: var(--text-secondary); font-family: 'SFMono-Regular', Consolas, monospace;
  font-size: 10px; padding: 4px 6px; background: var(--surface-hover); border-radius: 2px;
  transition: max-height 0.2s ease;
}
.agent-collapsible.tall { max-height: 7.5em; }
.agent-collapsible.expanded { max-height: none; }
.agent-collapsible-toggle {
  display: inline-block; font-size: 10px; color: var(--accent); cursor: pointer;
  margin-top: 2px; user-select: none;
}
.agent-collapsible-toggle:hover { text-decoration: underline; }
.agent-stats-bar {
  display: flex; gap: 8px; align-items: center; font-size: 11px; font-weight: 500; color: var(--text);
}
.agent-stats-bar .agent-stat-item {
  display: flex; align-items: center; gap: 2px;
}
.agent-stats-bar .agent-stat-num { font-weight: 700; color: var(--accent); }
.agent-tool-chart { margin-top: 4px; }
.agent-tool-row {
  display: flex; align-items: center; gap: 6px; margin-bottom: 2px; font-size: 10px;
}
.agent-tool-label {
  min-width: 80px; color: var(--text-secondary);
  font-family: 'SFMono-Regular', Consolas, monospace; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
}
.agent-tool-bar-bg {
  flex: 1; height: 10px; background: var(--surface-hover); border-radius: 0; overflow: hidden;
}
.agent-tool-bar-fill {
  height: 100%; background: var(--accent); border-radius: 0; transition: width 0.2s;
}
.agent-tool-count {
  min-width: 24px; text-align: right; color: var(--text-muted); font-weight: 600;
}

/* ─── Turn Agent Cards (conversation-linked) ─── */
.turn-agents-container {
  margin: 4px 0 2px 0; padding: 0 0 0 12px;
  border-left: 2px solid var(--border);
}
.turn-agent-card {
  padding: 6px 10px; margin-bottom: 4px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 4px; font-size: 11px;
}
.turn-agent-header {
  display: flex; align-items: center; gap: 6px; font-size: 11px;
}
.turn-agent-header .ta-icon { flex-shrink: 0; }
.turn-agent-header .ta-name { font-weight: 600; color: var(--text); }
.turn-agent-header .ta-status { font-size: 10px; flex-shrink: 0; }
.turn-agent-header .ta-meta {
  color: var(--text-muted); font-size: 10px; margin-left: auto; white-space: nowrap;
}
.turn-agent-body { margin-top: 4px; }
.turn-agent-line {
  display: flex; align-items: flex-start; gap: 4px; font-size: 10px; margin-bottom: 2px;
}
.turn-agent-line-label { color: var(--text-muted); flex-shrink: 0; }
.turn-agent-line-value {
  color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap; cursor: pointer; flex: 1;
}
.turn-agent-line-value.expanded { white-space: pre-wrap; overflow: visible; }
.turn-no-agents {
  padding: 4px 10px; margin: 4px 0 2px 12px; font-size: 10px;
  color: var(--text-muted); border-left: 2px solid var(--border);
}
.dp-timeline-item.clickable { cursor: default; }
.dp-timeline-item.turn-expanded { background: var(--accent-bg); border-radius: 2px; padding: 5px 4px; border-left: 3px solid var(--accent); }
.dp-timeline-item.turn-expanded .turn-detail-btn { background: var(--accent); color: #fff; border-color: var(--accent); }
.turn-detail-btn {
  display: inline-flex; align-items: center; gap: 2px;
  font-size: 10px; padding: 1px 6px; margin-left: 6px;
  border: 1px solid var(--border); border-radius: 3px;
  background: var(--surface); color: var(--text-secondary);
  cursor: pointer; transition: all 0.15s; vertical-align: middle;
  flex-shrink: 0;
}
.turn-detail-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
.agent-filtered-header {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; border-bottom: 1px solid var(--border); background: var(--bg);
}
.agent-filtered-title { font-weight: 600; font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 6px; }
.agent-filtered-count { font-size: 11px; color: var(--text-muted); }
.agent-back-btn {
  cursor: pointer; background: none; border: none;
  color: var(--accent); font-size: 12px; padding: 2px 4px;
}
.agent-back-btn:hover { text-decoration: underline; }
.agent-list { padding: 0; }
.agent-item {
  padding: 8px 12px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.1s; font-size: 12px;
}
.agent-item:hover { background: var(--surface-hover); }
.agent-item.selected { background: var(--accent-bg); border-left: 3px solid var(--accent); }
.agent-item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
.agent-item-name { font-weight: 600; color: var(--text); }
.agent-item-status { font-size: 10px; padding: 1px 6px; border-radius: 2px; }
.agent-item-status.done { background: #d4edda; color: #155724; }
.agent-item-status.running { background: #cce5ff; color: #004085; }
.agent-item-status.failed { background: #f8d7da; color: #721c24; }
.agent-item-prompt { color: var(--text-muted); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.agent-item-time { color: var(--text-muted); font-size: 10px; margin-top: 2px; }
.agent-btn {
  padding: 4px 10px; font-size: 11px; border: 1px solid var(--border);
  border-radius: 2px; cursor: pointer; background: var(--surface);
  color: var(--text-secondary); transition: all 0.1s;
  display: inline-flex; align-items: center; gap: 5px;
}
.agent-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.detail-panel-header {
  padding: 8px 12px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg); flex-shrink: 0;
}
.detail-panel-header h2 { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.detail-close {
  background: none; border: none; font-size: 16px; cursor: pointer;
  color: var(--text-muted); padding: 2px 6px; border-radius: 0;
  transition: all 0.1s;
}
.detail-close:hover { background: var(--surface-hover); color: var(--text); }
.agent-header-btn {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; padding: 5px 14px; border: 1px solid var(--accent);
  border-radius: 4px; background: transparent; color: var(--accent);
  cursor: pointer; transition: all 0.15s; font-weight: 600;
}
.agent-header-btn:hover { background: var(--accent); color: #fff; }

/* ─── Session Timeline ─── */
.tl-container { padding: 12px 8px; }
.tl-turn {
  position: relative; padding-left: 24px; margin-bottom: 0;
  animation: contentFadeIn 0.15s ease;
}
.tl-turn::before {
  content: '';
  position: absolute; left: 8px; top: 0; bottom: 0;
  width: 2px; background: var(--border);
}
.tl-time {
  position: relative; font-size: 11px; color: var(--text-muted);
  padding: 4px 0; font-weight: 600;
  display: flex; align-items: center; gap: 8px;
}
.tl-turn-tokens {
  font-size: 10px; font-weight: 500; color: var(--accent);
  background: color-mix(in srgb, var(--accent) 12%, transparent);
  padding: 1px 6px; border-radius: 8px;
}
.tl-time::before {
  content: '';
  position: absolute; left: -20px; top: 50%; transform: translateY(-50%);
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--success); border: 2px solid var(--surface);
}
.tl-turn.tl-turn-active .tl-time::before {
  background: var(--accent);
  animation: agent-pulse 1.2s ease-in-out infinite;
}
.tl-user {
  background: var(--accent-bg); border-radius: 4px;
  padding: 6px 10px; margin: 4px 0; font-size: 12px;
  border-left: 3px solid var(--accent);
  cursor: pointer; overflow: hidden;
}
.tl-target-agent {
  display: inline-block;
  background: rgba(9,105,218,0.1); color: var(--accent);
  font-size: 11px; font-weight: 600;
  padding: 1px 7px; border-radius: 3px;
  margin-right: 4px; vertical-align: baseline;
}
.tl-target-agent::before { content: '@'; font-weight: 400; opacity: 0.6; }
.tl-user .tl-text, .tl-assistant .tl-text {
  overflow: hidden; text-overflow: ellipsis;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  min-width: 0; max-width: 100%;
}
.tl-user.expanded .tl-text, .tl-assistant.expanded .tl-text {
  -webkit-line-clamp: unset; white-space: pre-wrap; word-break: break-word;
}
.tl-assistant {
  padding: 4px 10px; margin: 2px 0; font-size: 11px;
  color: var(--text-secondary);
}
.tl-direct-tools {
  display: flex; flex-wrap: wrap; gap: 4px;
  padding: 2px 10px; margin: 2px 0;
}
.tl-tool-badge {
  font-size: 10px; padding: 1px 6px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 2px; color: var(--text-muted);
}
.tl-tool-badge--complete {
  border-left: 2px solid var(--accent);
  color: var(--text);
}
.tl-agent {
  position: relative; margin: 6px 0; padding-left: 16px;
  border-left: 2px solid var(--border);
}
.tl-agent-header {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 8px; font-size: 12px; cursor: pointer;
  border-radius: 3px; transition: background 0.1s;
}
.tl-agent-header:hover { background: var(--surface-hover); }
.tl-agent-icon { flex-shrink: 0; }
.tl-agent-name { font-weight: 600; color: var(--text); }
.tl-agent-status { font-size: 10px; }
.tl-agent-meta { font-size: 10px; color: var(--text-muted); margin-left: auto; }
.tl-agent-body {
  padding: 4px 8px; font-size: 11px; display: none;
}
.tl-agent.expanded .tl-agent-body { display: block; }
.tl-tool-chart { margin: 4px 0; }
.tl-tool-row {
  display: flex; align-items: center; gap: 4px;
  font-size: 10px; margin: 1px 0;
}
.tl-tool-label { width: 80px; text-align: right; color: var(--text-muted); }
.tl-tool-bar-bg {
  flex: 1; height: 6px; background: var(--surface-hover);
  border-radius: 1px; overflow: hidden;
}
.tl-tool-bar-fill { height: 100%; background: var(--accent); border-radius: 1px; }
.tl-tool-count { font-size: 9px; color: var(--text-muted); width: 20px; }
.tl-collapsible {
  max-height: 3em; overflow: hidden; cursor: pointer;
  position: relative; padding: 4px 8px;
  color: var(--text-secondary); font-size: 11px;
  white-space: pre-wrap; word-break: break-word;
  background: var(--bg); border-radius: 3px;
  border-left: 2px solid var(--border);
}
.tl-collapsible.expanded { max-height: none; }
.tl-collapsible-label {
  font-size: 10px; color: var(--accent); cursor: pointer;
  display: none; margin-top: 2px;
}
.tl-collapsible-label.visible { display: inline-block; }
.tl-collapsible-label:hover { text-decoration: underline; }
.tl-section-label {
  font-size: 10px; color: var(--text-muted); margin-bottom: 3px;
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
}
.tl-section-label.prompt { color: var(--accent); }
.tl-section-label.result { color: var(--success); }
/* Agent call chain tree connector */
.tl-sub-agents {
  margin: 8px 0 0 20px;
  padding-left: 16px;
  border-left: 2px solid var(--border);
  position: relative;
}
.tl-sub-agents > .tl-agent {
  position: relative;
}
.tl-sub-agents > .tl-agent::before {
  content: '';
  position: absolute;
  left: -16px;
  top: 14px;
  width: 12px;
  height: 0;
  border-top: 2px solid var(--border);
}
.tl-sub-agents > .tl-agent:last-child {
  margin-bottom: 0;
}
.tl-call-label {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin: 8px 0 4px 0;
  padding-left: 4px;
  font-weight: 600;
}
.tl-called-by {
  font-size: 10px;
  color: var(--text-muted);
  margin-left: 8px;
  font-weight: 400;
}
.tl-agent[data-status="done"] { border-left-color: #28a745; }
.tl-agent[data-status="failed"] { border-left-color: #dc3545; }
.tl-agent[data-status="running"] { border-left-color: var(--accent); }
.tl-agent[data-status="running"] > .tl-agent-header > .tl-agent-icon {
  animation: agent-pulse 1.2s ease-in-out infinite;
}
@keyframes agent-pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(0.2); opacity: 0.4; }
}

.detail-panel-body {
  flex: 1; overflow-y: auto; padding: 0;
}

/* Detail sections */
.dp-section {
  padding: 10px 16px; border-bottom: 1px solid var(--border);
}
.dp-section:last-child { border-bottom: none; }
.dp-section-title {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 8px;
  padding-bottom: 4px; border-bottom: 1px solid var(--border);
}
.dp-desc {
  font-size: 12px; color: var(--text); display: inline; line-height: 1.5;
}
.dp-desc-btn {
  font-size: 10px; color: var(--text-muted); background: none; border: 1px solid var(--border);
  border-radius: 3px; padding: 1px 6px; cursor: pointer; margin-left: 6px; vertical-align: middle;
}
.dp-desc-btn:hover { border-color: var(--accent); color: var(--accent); }
.dp-desc-edit {
  font-size: 12px; color: var(--text); padding: 6px 8px; width: 100%;
  background: var(--bg); border: 1px solid var(--accent); border-radius: 4px;
  min-height: 40px; line-height: 1.5; resize: vertical;
  font-family: inherit; outline: none; box-sizing: border-box;
}
.dp-desc-actions { display: flex; gap: 4px; margin-top: 4px; justify-content: flex-end; }
.dp-desc-actions button {
  padding: 2px 10px; font-size: 11px; border-radius: 3px; cursor: pointer; border: 1px solid var(--border);
}
.dp-desc-actions .save-btn { background: var(--accent); color: #fff; border-color: var(--accent); }
.dp-desc-actions .cancel-btn { background: var(--card-bg); color: var(--text); }
.dp-state-row {
  display: flex; align-items: center; gap: 6px; margin-bottom: 8px;
}
.dp-state-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 2px; font-size: 11px; font-weight: 600;
}
.dp-state-pill.working { background: var(--accent-bg); color: var(--accent); }
.dp-state-pill.waiting { background: #fff8c5; color: var(--warning); }
.dp-state-pill.idle { background: #dafbe1; color: var(--success); }
.dp-state-pill.completed { background: var(--bg); color: var(--text-muted); }
.dp-state-pill.unknown { background: var(--bg); color: var(--text-muted); }

.dp-field { display: flex; margin-bottom: 6px; font-size: 12px; line-height: 1.5; }
.dp-field-label { color: var(--text-muted); min-width: 72px; flex-shrink: 0; font-size: 11px; }
.dp-field-value { color: var(--text); word-break: break-all; }
.dp-field-value.mono { font-family: 'SFMono-Regular', Consolas, 'Courier New', monospace; font-size: 11px; }

.dp-intent { display: none; }
.dp-waiting-box {
  padding: 5px 10px; background: #fff8c5; border: 1px solid #d4a72c44;
  border-radius: 0; font-size: 11px; color: var(--warning); margin-top: 6px;
  border-left: 2px solid var(--warning);
}

/* Stat pills */
.dp-stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
}
.dp-stat {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 8px 4px; border-radius: 2px; font-size: 10px;
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px;
  font-weight: 500;
}
.dp-stat .num {
  font-size: 18px; font-weight: 700; color: var(--text);
  line-height: 1.2; margin-bottom: 1px;
}
.dp-stat .num.accent { color: var(--accent); }
.dp-stat .stat-icon { font-size: 10px; margin-bottom: 2px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }

/* Tool chart */
.dp-tool-bar {
  display: flex; align-items: center; gap: 6px; margin-bottom: 3px; font-size: 11px;
}
.dp-tool-name { min-width: 90px; color: var(--text-secondary); font-family: 'SFMono-Regular', Consolas, monospace; font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dp-tool-fill {
  flex: 1; height: 12px; background: var(--bg); border-radius: 0; overflow: hidden;
}
.dp-tool-fill-inner {
  height: 100%; background: var(--accent); border-radius: 0; transition: width 0.2s;
}
.dp-tool-count { min-width: 32px; text-align: right; font-size: 10px; color: var(--text-muted); font-weight: 600; }

/* Turns / Events timeline */
.dp-timeline { list-style: none; }
.dp-timeline-item {
  padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12px;
  display: flex; flex-direction: column; gap: 2px;
}
.dp-timeline-item:last-child { border-bottom: none; }
.dp-timeline-time { font-size: 10px; color: var(--text-muted); font-family: 'SFMono-Regular', Consolas, monospace; }
.dp-timeline-msg {
  color: var(--text); line-height: 1.4; max-height: 48px; overflow: hidden;
  text-overflow: ellipsis; cursor: pointer; font-size: 12px;
}
.dp-timeline-msg.expanded { max-height: none; }
.dp-timeline-msg:hover { color: var(--accent); }
.dp-pagination {
  display: flex; align-items: center; justify-content: center;
  gap: 4px; padding: 8px 0; flex-wrap: wrap;
}
.dp-pagination button {
  background: var(--card-bg); border: 1px solid var(--border); border-radius: 4px;
  color: var(--text); cursor: pointer; padding: 3px 8px; font-size: 11px;
  min-width: 28px; transition: all 0.15s;
}
.dp-pagination button:hover { border-color: var(--accent); color: var(--accent); }
.dp-pagination button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.dp-pagination button:disabled { opacity: 0.4; cursor: default; }
.dp-pagination .dp-page-info { font-size: 10px; color: var(--text-muted); margin: 0 4px; }
.dp-turns-loading { text-align: center; padding: 20px; color: var(--text-muted); font-size: 12px; }
#turnsList { text-align: left; }

/* Checkpoint cards */
.dp-checkpoint {
  padding: 6px 10px; border: 1px solid var(--border); border-radius: 0;
  margin-bottom: 4px; cursor: pointer; transition: all 0.1s;
}
.dp-checkpoint:hover { border-color: var(--accent); background: var(--surface-hover); }
.dp-checkpoint-num { font-size: 10px; font-weight: 700; color: var(--accent); margin-right: 4px; }
.dp-checkpoint-title { font-size: 11px; color: var(--text-secondary); }
.dp-checkpoint-content {
  display: none; margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border);
  font-size: 11px; color: var(--text-secondary); white-space: pre-wrap;
  max-height: 200px; overflow-y: auto; line-height: 1.4;
}
.dp-checkpoint.expanded .dp-checkpoint-content { display: block; }

/* Plan content */
.dp-plan {
  font-size: 11px; color: var(--text-secondary); white-space: pre-wrap;
  line-height: 1.5; max-height: 300px; overflow-y: auto;
  padding: 8px 10px; background: var(--bg); border-radius: 0;
  font-family: 'SFMono-Regular', Consolas, 'Courier New', monospace;
}

/* Files list */

/* Copy icon button */
.copy-icon-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text-muted); padding: 2px; margin-left: 6px;
  vertical-align: middle; transition: color 0.1s; line-height: 1;
}
.copy-icon-btn:hover { color: var(--accent); }

/* Toast notification */
.toast-msg {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: #212529; color: #fff;
  padding: 10px 28px; font-size: 13px; font-weight: 500; z-index: 9999;
  opacity: 0; transition: opacity 0.3s, transform 0.3s;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25); border-radius: 6px;
  white-space: nowrap;
}
.toast-msg.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.dp-file {
  font-size: 11px; font-family: 'SFMono-Regular', Consolas, monospace;
  color: var(--text-secondary); padding: 2px 0; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
}
.dp-file:hover { color: var(--accent); }

/* BG tasks */
.dp-bgtask {
  padding: 4px 8px; background: var(--bg); border-radius: 0;
  font-size: 11px; margin-bottom: 3px; display: flex; align-items: center; gap: 4px;
}
.dp-bgtask-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: breathe 1.5s ease-in-out infinite; }

/* ── Path Config Modal ── */
.path-modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
  display: none; align-items: center; justify-content: center;
  z-index: 9999; opacity: 0; transition: opacity 0.3s;
}
.path-modal-overlay.visible { opacity: 1; }
.path-modal {
  background: var(--surface); border-radius: 6px; padding: 40px 36px 32px;
  width: 560px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  text-align: center; border: 1px solid var(--border);
}
.path-modal-logo { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 4px; letter-spacing: -0.3px; display: flex; align-items: center; justify-content: center; gap: 8px; }
.path-modal-logo .logo-mark { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; }
.path-modal-title {
  font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 4px; margin-top: 12px;
}
.path-modal-subtitle {
  font-size: 13px; color: var(--text-secondary); margin-bottom: 28px; line-height: 1.5;
}
.path-modal-input {
  width: 100%; box-sizing: border-box; padding: 10px 12px; font-size: 13px;
  border: 1px solid var(--border); border-radius: 4px; background: var(--bg);
  color: var(--text); outline: none; font-family: 'Consolas', 'SF Mono', monospace;
}
.path-modal-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(34,139,230,0.12); }
.path-modal-btn {
  margin-top: 12px; width: 100%; padding: 10px; font-size: 13px; font-weight: 600;
  border: 1px solid var(--accent); border-radius: 4px; cursor: pointer;
  background: transparent; color: var(--accent); transition: all 0.15s;
}
.path-modal-btn:hover { background: var(--accent); color: #fff; }
.path-modal-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.path-modal-error {
  margin-top: 16px; font-size: 13px; color: var(--text); min-height: 18px;
}
.path-modal-error .err-title {
  font-weight: 600; font-size: 13px; color: var(--danger); margin-bottom: 10px;
}
.path-modal-error .err-solutions {
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  padding: 14px 16px; margin-top: 8px;
}
.path-modal-error .err-solutions-title {
  font-weight: 600; font-size: 12px; color: var(--text); margin-bottom: 10px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.path-modal-error .err-solutions ol {
  margin: 0; padding-left: 20px; list-style: decimal; text-align: left;
}
.path-modal-error .err-solutions ol li {
  margin-bottom: 8px; font-size: 12px; line-height: 1.6; color: var(--text-muted); text-align: left;
}
.path-modal-error .err-solutions ol li:last-child { margin-bottom: 0; }
.path-modal-error .err-solutions ol li strong {
  color: var(--text); font-weight: 600;
}
.path-modal-error .err-solutions ol li code {
  background: var(--surface); padding: 2px 6px; border-radius: 3px;
  font-size: 11px; font-family: 'SF Mono', Monaco, monospace;
  border: 1px solid var(--border);
}
.err-cmd-wrap {
  display: inline-flex; align-items: center; gap: 4px; margin-top: 2px;
}
.err-copy-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border: 1px solid var(--border); border-radius: 4px;
  background: var(--surface); color: var(--text-muted); cursor: pointer;
  font-size: 11px; padding: 0; transition: all 0.15s;
}
.err-copy-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.err-copy-btn.copied { background: var(--success, #22c55e); color: #fff; border-color: var(--success, #22c55e); }
.path-modal-current {
  margin-top: 20px; font-size: 11px; color: var(--text-muted);
  padding-top: 16px; border-top: 1px solid var(--border);
}

/* ─── Generic Modal ─── */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 10000;
  justify-content: center; align-items: center;
}
.modal-overlay.visible { display: flex; }
.modal-container {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; width: 90%; max-width: 700px; max-height: 80vh;
  display: flex; flex-direction: column;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
}
.modal-title { font-size: 14px; font-weight: 600; color: var(--text); margin: 0; }
.modal-close {
  background: none; border: none; font-size: 18px; color: var(--text-muted);
  cursor: pointer; padding: 0 4px; line-height: 1;
}
.modal-close:hover { color: var(--text); }
.modal-body {
  padding: 16px; overflow-y: auto; flex: 1;
  font-size: 12px; color: var(--text);
}
.tl-tool-badge { cursor: pointer; }
.tl-tool-badge:hover { background: var(--surface-hover); border-color: var(--accent); color: var(--text); }

/* ─── Project Config Section ─── */
.dp-project-config {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  padding: 8px 12px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; margin-top: 8px;
}
.dp-pc-item {
  display: flex; align-items: center; gap: 4px;
  font-size: 12px; color: var(--text-secondary); white-space: nowrap;
}
.dp-pc-item .pc-count {
  font-weight: 700; color: var(--text); font-size: 13px;
}
.dp-pc-item .pc-check {
  font-size: 12px; font-weight: 600; color: var(--text-secondary);
}
.dp-pc-item + .dp-pc-item::before {
  content: '·'; color: var(--text-muted); margin-right: 4px;
  font-weight: 700; font-size: 14px; line-height: 1;
}
.dp-pc-detail-btn {
  margin-left: auto;
  padding: 3px 10px; font-size: 11px; font-weight: 500;
  background: var(--accent-bg); color: var(--accent);
  border: 1px solid var(--accent); border-radius: 3px;
  cursor: pointer; transition: all 0.15s;
  white-space: nowrap;
}
.dp-pc-detail-btn:hover {
  background: var(--accent); color: #fff;
}

/* ─── Project Config Modal ─── */
.pc-modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.55); z-index: 10001;
  justify-content: center; align-items: center;
  animation: pcFadeIn 0.15s ease;
}
.pc-modal-overlay.visible { display: flex; }
@keyframes pcFadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes pcSlideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.pc-modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; width: 92%; max-width: 960px; height: 75vh;
  display: flex; flex-direction: column;
  box-shadow: 0 12px 48px rgba(0,0,0,0.25);
  animation: pcSlideUp 0.2s ease;
}
.pc-modal-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.pc-modal-title {
  font-size: 15px; font-weight: 700; color: var(--text); margin: 0;
  display: flex; align-items: center; gap: 8px;
}
.pc-modal-close {
  background: none; border: none; font-size: 20px; color: var(--text-muted);
  cursor: pointer; padding: 2px 6px; line-height: 1; border-radius: 4px;
  transition: all 0.15s;
}
.pc-modal-close:hover { color: var(--text); background: var(--surface-hover); }

/* Tabs */
.pc-tabs {
  display: flex; border-bottom: 1px solid var(--border);
  padding: 0 20px; flex-shrink: 0; gap: 0;
}
.pc-tab {
  padding: 10px 16px; font-size: 12px; font-weight: 600;
  color: var(--text-muted); background: none; border: none;
  cursor: pointer; position: relative;
  transition: color 0.15s;
  display: flex; align-items: center; gap: 0;
}
.pc-tab:hover { color: var(--text-secondary); }
.pc-tab.active {
  color: var(--accent);
}
.pc-tab.active::after {
  content: ''; position: absolute; bottom: -1px; left: 8px; right: 8px;
  height: 2px; background: var(--accent); border-radius: 2px 2px 0 0;
}

/* Modal body */
.pc-modal-body {
  padding: 16px 20px; overflow-y: auto; flex: 1;
}

/* Agent/Skill Cards Grid */
.pc-cards {
  display: grid; grid-template-columns: 1fr;
  gap: 12px;
}
@media (min-width: 600px) {
  .pc-cards { grid-template-columns: 1fr 1fr; }
}

.pc-card {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; padding: 16px;
  cursor: pointer; transition: all 0.15s;
  position: relative;
}
.pc-card:hover {
  border-color: var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.pc-card-header {
  display: flex; align-items: flex-start; gap: 12px;
}
.pc-card-icon {
  font-size: 12px; line-height: 1; flex-shrink: 0;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  background: var(--accent-bg); color: var(--accent);
  border: 1px solid var(--border); border-radius: 8px;
  font-family: 'SFMono-Regular', Consolas, 'Courier New', monospace;
  font-weight: 700; letter-spacing: 0.5px;
}
.pc-card-expand-arrow {
  position: absolute; right: 12px; bottom: 10px;
  font-size: 11px; color: var(--text-muted);
  opacity: 0; transition: opacity 0.15s;
}
.pc-card:hover .pc-card-expand-arrow { opacity: 0.7; }
.pc-card.expanded .pc-card-expand-arrow { opacity: 1; transform: rotate(90deg); }
.pc-card-info { flex: 1; min-width: 0; }
.pc-card-name {
  font-size: 13px; font-weight: 700; color: var(--text);
  margin-bottom: 2px;
}
.pc-card-desc {
  font-size: 11px; color: var(--text-secondary); line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.pc-card-file {
  font-size: 10px; color: var(--text-muted); margin-top: 6px;
  font-family: 'SFMono-Regular', Consolas, 'Courier New', monospace;
  display: flex; align-items: center; gap: 4px;
}

/* Card body (expanded) */
.pc-card-body {
  max-height: 0; overflow: hidden;
  transition: max-height 0.25s ease;
}
.pc-card.expanded .pc-card-body {
  max-height: 600px; overflow-y: auto;
}
.pc-card.expanded { border-color: var(--accent); }
.pc-card-body-inner {
  margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--border);
}
.pc-card-body-inner pre {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px; padding: 12px; font-size: 11px;
  line-height: 1.6; white-space: pre-wrap; word-break: break-word;
  color: var(--text); margin: 0;
  font-family: 'SFMono-Regular', Consolas, 'Courier New', monospace;
  max-height: 400px; overflow-y: auto;
}

/* Instructions section */
.pc-instructions-content {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; padding: 16px;
}
.pc-instructions-meta {
  display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
  padding-bottom: 10px; border-bottom: 1px solid var(--border);
}
.pc-instructions-meta .pc-meta-badge {
  font-size: 10px; font-weight: 600; padding: 2px 8px;
  background: var(--accent-bg); color: var(--accent);
  border-radius: 10px;
}
.pc-instructions-pre {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px; padding: 14px; font-size: 11px;
  line-height: 1.7; white-space: pre-wrap; word-break: break-word;
  color: var(--text); margin: 0;
  font-family: 'SFMono-Regular', Consolas, 'Courier New', monospace;
  max-height: 500px; overflow-y: auto;
}

/* Empty state for cards */
.pc-empty {
  text-align: center; padding: 40px 20px; color: var(--text-muted);
  font-size: 12px;
}
.pc-empty-icon {
  font-size: 14px; margin-bottom: 8px; opacity: 0.5;
  font-weight: 600; letter-spacing: 1px;
}
</style>

<script>
/* ─── VS Code Extension Support ─── */
const API_BASE = window.GHCP_LENS_API_BASE || (window.GHCP_LENS_PORT ? `http://localhost:${window.GHCP_LENS_PORT}` : '');
const IS_VSCODE = !!window.GHCP_LENS_VSCODE;

// Listen for VS Code theme sync
if (IS_VSCODE) {
  window.addEventListener('message', e => {
    if (e.data && e.data.type === 'theme-sync') {
      document.documentElement.setAttribute('data-theme', e.data.theme);
      try { localStorage.setItem('theme', e.data.theme); } catch(ex) {}
    }
  });
}

/* ─── Path Config Modal ─── */
function rebuildPathModal() {

function showPathModal(currentPath) {
  const modal = document.getElementById('pathModal');
  const input = document.getElementById('pathModalInput');
  const current = document.getElementById('pathModalCurrent');
  input.value = currentPath || '';
  current.textContent = currentPath ? `Current path: ${currentPath}` : '';
  modal.style.display = 'flex';
  requestAnimationFrame(() => modal.classList.add('visible'));
  input.focus();
  input.addEventListener('keydown', e => { if (e.key === 'Enter') submitPathConfig(); });
}

function hidePathModal() {
  const modal = document.getElementById('pathModal');
  modal.classList.remove('visible');
  setTimeout(() => { modal.style.display = 'none'; }, 300);
}

function cmdWithCopy(cmd) {
  const id = 'cp_' + Math.random().toString(36).slice(2, 8);
  return `<span class="err-cmd-wrap"><code>${cmd}</code><button class="err-copy-btn" id="${id}" onclick="navigator.clipboard.writeText('${cmd}').then(()=>{const b=document.getElementById('${id}');b.textContent='✓';b.classList.add('copied');setTimeout(()=>{b.textContent='⧉';b.classList.remove('copied')},1500)})">⧉</button></span>`;
}

function buildPathErrorHTML(title) {
  return `
    <div class="err-title">${title}</div>
    <div class="err-solutions">
      <div class="err-solutions-title">Solutions</div>
      <ol>
        <li><strong>Verify the path</strong> — Default session path is <code>~/.copilot/session-state/</code>. Make sure this directory exists.</li>
        <li><strong>Install via npm</strong> (All platforms) — ${cmdWithCopy('npm install -g @github/copilot')} <span style="color:var(--text-muted);font-size:11px">(requires Node.js v22+)</span></li>
        <li><strong>Install via Homebrew</strong> (macOS / Linux) — ${cmdWithCopy('brew install copilot-cli')}</li>
        <li><strong>Install via WinGet</strong> (Windows) — ${cmdWithCopy('winget install GitHub.Copilot')}</li>
        <li><strong>Run Copilot CLI once</strong> — After installation, run ${cmdWithCopy('copilot')} in your terminal to create the session directory.</li>
      </ol>
    </div>`;
}

async function submitPathConfig() {
  const input = document.getElementById('pathModalInput');
  const btn = document.getElementById('pathModalBtn');
  const errEl = document.getElementById('pathModalError');
  const val = input.value.trim();
  if (!val) { errEl.textContent = t('pathRequired') || 'Please enter a path'; return; }
    btn.disabled = true; btn.textContent = t('connecting'); errEl.textContent = '';
  try {
    const res = await fetch(API_BASE + '/api/config', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionStatePath: val })
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.innerHTML = buildPathErrorHTML(data.error || 'Path not found');
      return;
    }
    localStorage.setItem('ghcpLensPathConfirmed', val);
    hidePathModal();
    fetchAll();
  } catch (e) {
    errEl.textContent = t('serverFail') + (API_BASE ? ` (${API_BASE})` : ' (no server)');
  } finally {
    btn.disabled = false; btn.textContent = t('connect');
  }
}

async function checkPathConfig() {
  // Reset flag from extension command
  if (window.GHCP_LENS_RESET) {
    localStorage.removeItem('ghcpLensPathConfirmed');
    window.GHCP_LENS_RESET = false;
  }
  // Force show connect screen with ?connect query param
  if (window.location.search.includes('connect')) {
    try {
      const res = await fetch(API_BASE + '/api/config');
      const data = await res.json();
      showPathModal(data.sessionStatePath);
    } catch (e) { showPathModal(''); }
    return;
  }
  // Show loading overlay while checking

/* ─── Utilities ─── */
const shortenPath = (cwd) => {
  if (!cwd) return '—';
  const parts = cwd.replace(/\\/g, '/').split('/').filter(Boolean);
  return parts.length <= 2 ? parts.join('/') : parts.slice(-2).join('/');
};

const timeAgo = (isoStr) => {
  if (!isoStr) return '';
  const diff = Math.floor((Date.now() - new Date(isoStr).getTime()) / 1000);
  if (diff < 60) return `${diff}${t('secAgo')}`;
  if (diff < 3600) return `${Math.floor(diff / 60)}${t('minAgo')}`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}${t('hrAgo')}`;
  return `${Math.floor(diff / 86400)}${t('dayAgo')}`;
};

const escHtml = (s) => {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
};

const formatTokens = (n) => {
  if (!n || n === 0) return '0';
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(n);
};

const stateLabel = (state) => {
  return t(state) || 'Unknown';
};

const stateClass = (state) => ['working','waiting','idle','completed'].includes(state) ? state : 'unknown';

/* ─── Session Monitor (Tree List) ─── */
let selectedSessionId = null;
let collapsedGroups = new Set();
let initialCollapseApplied = false;
let inactiveExpanded = false;
let showEmpty = false;
let collapsedInactiveGroups = new Set();
let allGroupsExpanded = true;

const getProjectName = (cwd) => {
  if (!cwd) return '(Unknown)';
  const parts = cwd.replace(/\\/g, '/').split('/').filter(Boolean);
  return parts.length >= 2 ? parts.slice(-2).join('/') : parts[parts.length - 1] || '(Unknown)';
};

const getProjectFolder = (cwd) => {
  if (!cwd) return '(Unknown)';
  const parts = cwd.replace(/\\/g, '/').split('/').filter(Boolean);
  return parts[parts.length - 1] || '(Unknown)';
};

const renderStats = (sessions) => {
  const active = sessions.filter(s => s.isActive);
  const working = active.filter(s => s.state === 'working');
  const waiting = active.filter(s => s.state === 'waiting');
  const allExpanded = allGroupsExpanded;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><span class="stat-dot blue"></span><span class="stat-count">${working.length}</span> ${t('working')}</div>
    <div class="stat"><span class="stat-dot yellow"></span><span class="stat-count">${waiting.length}</span> ${t('waiting')}</div>
    <div class="stat"><span class="stat-dot green"></span><span class="stat-count">${active.length}</span> ${t('idle')}</div>
    <div class="stat"><span class="stat-count">${sessions.length}</span> ${t('total')}</div>
    <div class="toggle-wrap" onclick="toggleAllGroups()">
      <div class="toggle-track ${allExpanded ? 'on' : ''}"><div class="toggle-knob"></div></div>
    </div>
  `;
};

const renderSessions = (sessions) => {
  if (!Array.isArray(sessions)) sessions = [];
  renderStats(sessions);

  // Filter out empty sessions unless toggled on
  const visible = sessions.filter(s => showEmpty || !s.isEmpty);

  // Group ALL sessions by project folder (unified)
  const groups = new Map();
  visible.forEach(s => {
    const project = getProjectName(s.cwd);
    if (!groups.has(project)) groups.set(project, []);
    groups.get(project).push(s);
  });

  // Sort groups: most recently updated first
  const sortedGroups = [...groups.entries()].sort((a, b) => {
    const aLatest = a[1].reduce((m, s) => s.updatedAt > m ? s.updatedAt : m, '');
    const bLatest = b[1].reduce((m, s) => s.updatedAt > m ? s.updatedAt : m, '');
    return bLatest.localeCompare(aLatest);
  });

  const container = document.getElementById('session-tree-container');

  if (visible.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">No Sessions</div>${t('noSessions')}</div>`;
    return;
  }

  let html = '<div class="session-tree">';

  // Column header with resize handles
  html += `<div class="st-header" id="stHeader">
    <div class="st-col-status"></div>
    <div class="st-col-summary">${t('session')}<span class="col-resize-handle" data-col="summary"></span></div>
    <div class="st-col-memo">${t('colMemo')}<span class="col-resize-handle" data-col="memo"></span></div>
    <div class="st-col-lastmsg">${t('lastMsg')}<span class="col-resize-handle" data-col="lastmsg"></span></div>
    <div class="st-col-turns">${t('colTurns')}</div>
    <div class="st-col-tokens">${t('colTokens')}</div>
    <div class="st-col-time">${t('recent')}</div>
  </div>`;

  // Auto-collapse folders with no active sessions on first load
  if (!initialCollapseApplied) {
    initialCollapseApplied = true;
    sortedGroups.forEach(([project, items]) => {
      if (!items.some(s => s.isActive)) collapsedGroups.add(project);
    });
    allGroupsExpanded = collapsedGroups.size === 0;
  }

  // Render all groups
  sortedGroups.forEach(([project, items]) => {
    const isCollapsed = collapsedGroups.has(project);
    const activeItems = items.filter(s => s.isActive);
    const workingCount = activeItems.filter(s => s.state === 'working').length;
    const idleCount = activeItems.filter(s => s.state === 'idle').length;
    const folder = getProjectFolder(items[0].cwd);
    const cwdJs = (items[0].cwd || '').replace(/\\/g, '\\\\');
    const hasActive = activeItems.length > 0;

    html += `<div class="st-group ${isCollapsed ? 'collapsed' : ''}">`;
    html += `<div class="st-group-header" onclick="toggleGroup('${escHtml(project)}')">`;
    html += `<span class="st-group-toggle">▼</span>`;
    html += `<span class="st-group-icon" style="font-size:10px;color:var(--text-muted)">${hasActive ? '&#9662;' : '&#9656;'}</span>`;
    html += `<span class="st-group-name">${escHtml(folder)}</span>`;
    html += `<div class="st-group-badges">`;
    html += `<span class="st-group-badge count">${t('total')} ${items.length}</span>`;
    html += `</div></div>`;

    html += `<div class="st-group-body">`;
    // Sort: active first, then by updatedAt desc
    items.sort((a, b) => {
      if (a.isActive !== b.isActive) return a.isActive ? -1 : 1;
      return (b.updatedAt || '').localeCompare(a.updatedAt || '');
    });

    items.forEach(s => {
      const sc = s.isActive ? stateClass(s.state) : 'completed';
      const sel = s.id === selectedSessionId ? ' selected' : '';
      const dimStyle = s.isActive ? '' : ' style="opacity:0.55"';
      html += `<div class="st-row${sel}"${dimStyle} onclick="openDetail('${s.id}')">`;
      html += `<div class="st-col-status"><span class="dot ${sc}"></span></div>`;
      html += `<div class="st-col-summary"${s.isActive ? '' : ' style="color:var(--text-secondary)"'}>${escHtml(s.summary || t('emptySession'))}</div>`;
      html += `<div class="st-col-memo">${escHtml(s.description || s.intent || '')}</div>`;
      html += `<div class="st-col-lastmsg">${escHtml(s.lastUserMessage || '')}</div>`;
      html += `<div class="st-col-turns">${s.turnCount ?? 0}</div>`;
      html += `<div class="st-col-tokens">${formatTokens(s.outputTokens || 0)}</div>`;
      html += `<div class="st-col-time">${timeAgo(s.updatedAt)}</div>`;
      html += `</div>`;
    });
    html += `</div></div>`;
  });

  // Empty session toggle
  const emptyCount = sessions.filter(s => s.isEmpty).length;
  if (emptyCount > 0) {
    html += `<div style="padding:8px 16px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted);border-top:1px solid var(--border)">`;
    html += `<label style="display:flex;align-items:center;gap:4px;cursor:pointer">`;
    html += `<input type="checkbox" ${showEmpty ? 'checked' : ''} onchange="toggleEmpty()">`;
    html += `${t('showEmpty')} (${emptyCount})`;
    html += `</label></div>`;
  }

  html += '</div>';
  container.innerHTML = html;
};

const toggleGroup = (project) => {
  if (project.startsWith('inactive:')) {
    if (collapsedInactiveGroups.has(project)) collapsedInactiveGroups.delete(project);
    else collapsedInactiveGroups.add(project);
  } else {
    if (collapsedGroups.has(project)) collapsedGroups.delete(project);
    else collapsedGroups.add(project);
    // Sync allGroupsExpanded: if any collapsed, it's not "all expanded"
    allGroupsExpanded = collapsedGroups.size === 0;
  }
  if (lastSessions) renderSessions(lastSessions);
};

const toggleInactive = () => {
  inactiveExpanded = !inactiveExpanded;
  if (lastSessions) renderSessions(lastSessions);
};

const toggleEmpty = () => {
  showEmpty = !showEmpty;
  if (lastSessions) renderSessions(lastSessions);
};

const toggleAllGroups = () => {
  allGroupsExpanded = !allGroupsExpanded;
  if (allGroupsExpanded) {
    collapsedGroups.clear();
  } else {
    // Collapse all groups by collecting all project keys from current sessions
    if (lastSessions) {
      const visible = lastSessions.filter(s => showEmpty || !s.isEmpty);
      visible.forEach(s => collapsedGroups.add(getProjectName(s.cwd)));
    }
  }
  if (lastSessions) renderSessions(lastSessions);
};

const launchVSCode = (folder, insiders, sessionId) => {
  if (IS_VSCODE) {
    // In VS Code webview — use postMessage to open folder natively
    const vscodeApi = window._vscodeApi || (window._vscodeApi = acquireVsCodeApi());
    vscodeApi.postMessage({ command: 'open-folder', folder, insiders });
    if (sessionId) {
      const cmd = `copilot --resume=${sessionId}`;
      navigator.clipboard.writeText(cmd).catch(() => {});
    }
    return;
  }
  fetch(API_BASE + '/api/launch-vscode', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ folder, insiders })
  }).then(r => r.json()).then(d => {
    if (!d.ok) return alert(t('launchFail') + ': ' + (d.error || ''));
    if (sessionId) {
      const cmd = `copilot --resume=${sessionId}`;
      navigator.clipboard.writeText(cmd).then(() => {
        copyText(cmd, t('vscodeOpened'));
      });
    }
  }).catch(() => alert(t('serverFail')));
};

    b.classList.toggle('active', b.classList.contains(theme) || (theme === 'light' && b.classList.contains('light')));
  });
};

let lastSessions = null;
let isTimelineView = false;

// Initial load
let firstLoadDone = false;
const fetchAll = () => {
  fetch(API_BASE + '/api/sessions').then(r => r.json()).then(s => {
    lastSessions = s;
    renderSessions(s);
    if (!firstLoadDone && s.length > 0) {
      firstLoadDone = true;
      const firstActive = s.find(x => x.isActive) || s[0];
      if (firstActive) openDetail(firstActive.id);
    }
  }).catch(() => {});
  // Also refresh detail panel if open
  if (selectedSessionId && detailOpen) {
    const sid = selectedSessionId;
    const dp = fetch(`${API_BASE}/api/sessions/${sid}`).then(r => r.json());
    const tap = fetch(`${API_BASE}/api/sessions/${sid}/turn-agents`).then(r => r.json()).catch(() => null);
    Promise.all([dp, tap]).then(([detail, turnAgents]) => {
      if (turnAgents && turnAgents.turns) window.turnAgentData = turnAgents.turns;
      // Selective update — only change dynamic parts, preserve user state
      updateDetailInPlace(detail);
      // Silently refresh turns (no flicker)
      pollRefreshTurns();
    }).catch(() => {});
  }
  // Also refresh timeline panel if open — append new turns + surgically update last turn
  if (isTimelineView && agentPanelOpen && selectedSessionId) {
    fetch(`${API_BASE}/api/sessions/${selectedSessionId}/timeline?limit=50&page=1`).then(r => r.json()).then(data => {
      if (!data || !data.timeline || !data.timeline.length) return;
      const body = document.getElementById('agentPanelBody');
      const container = body.querySelector('.tl-container');
      if (!container) return;

      const lastTlEl = container.querySelector('.tl-turn:last-child');
      const lastTlTime = lastTlEl ? (lastTlEl.querySelector('.tl-time-text') || lastTlEl.querySelector('.tl-time'))?.textContent.trim() : '';
      const newLast = data.timeline[data.timeline.length - 1];

      if (data.totalTurns !== window._timelineTotalTurns) {
        // New turns appeared — append only new ones
        const newTurns = [];
        for (let i = data.timeline.length - 1; i >= 0; i--) {
          const t = data.timeline[i];
          const ts = t.timestamp ? new Date(t.timestamp).toLocaleDateString('en-GB', { month: '2-digit', day: '2-digit' }) + ' ' + new Date(t.timestamp).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '';
          if (ts === lastTlTime) break;
          newTurns.unshift(t);
        }
        if (newTurns.length > 0) {
          let html = '';
          newTurns.forEach((turn, idx) => { html += renderTimelineTurn(turn, idx, true); });
          container.insertAdjacentHTML('beforeend', html);
          // Auto-scroll to bottom when new turns appear
          requestAnimationFrame(() => { body.scrollTop = body.scrollHeight; });
        }
        window._timelineTotalTurns = data.totalTurns;
      }

      // Surgically update ALL visible turns — APPEND missing parts only, never remove/replace
      const allTurnEls = container.querySelectorAll('.tl-turn');
      data.timeline.forEach((turnData, turnIdx) => {
        const ts = turnData.timestamp ? new Date(turnData.timestamp).toLocaleDateString('en-GB', { month: '2-digit', day: '2-digit' }) + ' ' + new Date(turnData.timestamp).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) : '';
        // Find matching DOM element by timestamp
        let turnEl = null;
        allTurnEls.forEach(el => {
          const elTime = (el.querySelector('.tl-time-text') || el.querySelector('.tl-time'))?.textContent.trim();
          if (elTime === ts) turnEl = el;
        });
        if (!turnEl) return;

        // Toggle tl-turn-active — active if any agent running OR still waiting for response
        const hasRunningDeep = (agents) => agents && agents.some(a => a.status === 'running' || hasRunningDeep(a.children));
        const isLastTurn = turnIdx === data.timeline.length - 1;
        const hasTools = turnData.directToolCalls && turnData.directToolCalls.length > 0;
        const stillProcessing = isLastTurn && !turnData.assistantMessage && !hasTools && !(turnData.agents && turnData.agents.length > 0);
        const isActive = hasRunningDeep(turnData.agents) || stillProcessing;
        turnEl.classList.toggle('tl-turn-active', isActive);

        // Update total tokens badge
        if (turnData.totalTokens) {
          const timeEl = turnEl.querySelector('.tl-time');
          let tokEl = timeEl?.querySelector('.tl-turn-tokens');
          const tokText = `${formatTokens(turnData.totalTokens)} output tokens`;
          if (tokEl) {
            if (tokEl.textContent !== tokText) tokEl.textContent = tokText;
          } else if (timeEl) {
            timeEl.insertAdjacentHTML('beforeend', `<span class="tl-turn-tokens">${tokText}</span>`);
          }
        }

        // Add assistant message if missing
        if (!turnEl.querySelector('.tl-assistant') && (turnData.assistantMessage || '').trim()) {
          const userEl = turnEl.querySelector('.tl-user');
          const insertAfter = userEl || turnEl.querySelector('.tl-time');
          if (insertAfter) {
            insertAfter.insertAdjacentHTML('afterend',
              `<div class="tl-assistant" onclick="this.classList.toggle('expanded')"><span class="tl-text">${escHtml(turnData.assistantMessage)}</span></div>`);
          }
        }
        // Update or add direct tools (always refresh badges to reflect latest counts)
        if (turnData.directToolCalls && turnData.directToolCalls.length > 0) {
          let toolsHtml = `<div class="tl-direct-tools"><span style="font-size:10px;color:var(--text-muted);margin-right:2px;font-weight:600">TOOLS</span>`;
          turnData.directToolCalls.forEach(tc => { toolsHtml += `<span class="tl-tool-badge${tc.toolName === 'task_complete' ? ' tl-tool-badge--complete' : ''}" onclick="showToolDetailModal('${escHtml(tc.toolName)}', 'interactionId', '${turnData.interactionId || ''}', '${selectedSessionId}')">${escHtml(tc.toolName)}${tc.count > 1 ? '\u00d7' + tc.count : ''}</span>`; });
          toolsHtml += `</div>`;
          const existingToolsEl = turnEl.querySelector(':scope > .tl-direct-tools');
          if (existingToolsEl) {
            existingToolsEl.outerHTML = toolsHtml;
          } else {
            const assistEl = turnEl.querySelector('.tl-assistant') || turnEl.querySelector('.tl-user') || turnEl.querySelector('.tl-time');
            if (assistEl) assistEl.insertAdjacentHTML('afterend', toolsHtml);
          }
        }
        // Add new agents (append ones that don't exist yet)
        const existingAgentCount = turnEl.querySelectorAll(':scope > .tl-agent').length;
        if (turnData.agents && turnData.agents.length > existingAgentCount) {
          for (let i = existingAgentCount; i < turnData.agents.length; i++) {
            const agentHtml = renderAgentNode(turnData.agents[i], 0, 'live', i, null);
            turnEl.insertAdjacentHTML('beforeend', agentHtml);
          }
        }
        // Recursively update agent nodes (status, meta, children)
        turnEl.querySelectorAll(':scope > .tl-agent').forEach((agentEl, idx) => {
          if (!turnData.agents || !turnData.agents[idx]) return;
          updateAgentNodeInPlace(agentEl, turnData.agents[idx], 'live', idx, null);
        });
      });

      // Auto-scroll if near bottom
      if (body.scrollHeight - body.scrollTop - body.clientHeight < 100) {
        requestAnimationFrame(() => { body.scrollTop = body.scrollHeight; });
      }
    }).catch(() => {});
  }
};

const getAgentIcon = (name) => {

const matchTurnAgents = (ts) => {
  if (!window.turnAgentData || !ts) return [];
  // Try exact timestamp match first, then fuzzy (within 2s)
  for (const turn of window.turnAgentData) {
    if (turn.timestamp === ts) return turn.agents || [];
  }
  // Fuzzy match: compare time within 2 seconds
  const targetTime = new Date(ts).getTime();
  if (isNaN(targetTime)) return [];
  for (const turn of window.turnAgentData) {
    const turnTime = new Date(turn.timestamp).getTime();
    if (!isNaN(turnTime) && Math.abs(turnTime - targetTime) < 2000) {
      return turn.agents || [];
    }
  }
  return [];
};

    html += `<div class="tl-direct-tools" style="margin-top:4px">`;
    html += `<span style="font-size:10px;color:var(--text-muted);margin-right:2px;font-weight:600">TOOLS</span>`;
    entries.forEach(([toolName, count]) => {
      html += `<span class="tl-tool-badge${toolName === 'task_complete' ? ' tl-tool-badge--complete' : ''}">${escHtml(toolName)}${count > 1 ? '\u00d7' + count : ''}</span>`;
    });
    html += `</div>`;
  }

  html += `<div class="turn-agent-body">`;
  // Prompt line
  if (a.agentPrompt) {
    html += `<div class="turn-agent-line">`;
    html += `<span class="turn-agent-line-label" style="font-weight:600;font-size:9px;text-transform:uppercase">P</span>`;
    html += `<span class="turn-agent-line-value" id="${promptId}" onclick="event.stopPropagation();this.classList.toggle('expanded')" title="${escHtml(a.agentPrompt)}">${escHtml(a.agentPrompt)}</span>`;
    html += `</div>`;
  }
  // Result line
  if (a.finalResult) {
    html += `<div class="turn-agent-line">`;
    html += `<span class="turn-agent-line-label" style="font-weight:600;font-size:9px;text-transform:uppercase">R</span>`;
    html += `<span class="turn-agent-line-value" id="${resultId}" onclick="event.stopPropagation();this.classList.toggle('expanded')" title="${escHtml(a.finalResult)}">${escHtml(a.finalResult)}</span>`;
    html += `</div>`;
  }
  html += `</div></div>`;
  return html;
};

/* ─── Generic Modal ─── */
const showModal = (title, contentHtml) => {

  document.getElementById('modalBody').innerHTML = contentHtml;

const hideModal = () => {

/* ─── Tool Detail Modal ─── */
const showToolDetailModal = async (toolName, filterKey, filterValue, sessionId) => {
  showModal(toolName, `<div style="text-align:center;padding:20px;color:var(--text-muted)">${t('loading')}</div>`);
  try {
    const res = await fetch(`${API_BASE}/api/sessions/${sessionId}/tool-calls?${filterKey}=${encodeURIComponent(filterValue)}&toolName=${toolName}`);
    const data = await res.json();
    if (!data.toolCalls || data.toolCalls.length === 0) {
      document.getElementById('modalBody').innerHTML = `<div style="text-align:center;padding:20px;color:var(--text-muted)">${t('toolNoData')}</div>`;
      return;
    }
    let html = '';
    data.toolCalls.forEach((tc, i) => {
      html += `<div class="tool-detail-item" style="margin-bottom:16px;${i > 0 ? 'border-top:1px solid var(--border);padding-top:12px;' : ''}">`;
      html += `<div style="font-weight:600;font-size:12px;margin-bottom:8px;">${escHtml(tc.toolName)} <span style="color:var(--text-muted);font-weight:400">#${i+1}</span></div>`;
      if (tc.input) {
        html += `<div style="margin-bottom:8px"><div style="font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:4px">${t('toolInput')}</div>`;
        html += `<pre style="background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:8px;font-size:11px;overflow-x:auto;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto;margin:0">${escHtml(typeof tc.input === 'string' ? tc.input : JSON.stringify(tc.input, null, 2))}</pre></div>`;
      }
      if (tc.result) {
        html += `<div><div style="font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:4px">${t('toolOutput')}</div>`;
        html += `<pre style="background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:8px;font-size:11px;overflow-x:auto;white-space:pre-wrap;word-break:break-all;max-height:300px;overflow-y:auto;margin:0">${escHtml(typeof tc.result === 'string' ? tc.result : JSON.stringify(tc.result, null, 2))}</pre></div>`;

    });

/* ─── Project Config (Agents / Skills / Instructions) ─── */
const projectConfigCache = {};

const AGENT_INITIALS = {
  'pm': 'PM', 'backend-developer': 'BE', 'ui-developer': 'UI',
  'tester': 'TE', 'infra-engineer': 'IN', 'release-manager': 'RM',
};
const getInitials = (name, type) => {
  if (type === 'agent') return AGENT_INITIALS[name] || name.slice(0, 2).toUpperCase();
  return name.slice(0, 2).toUpperCase();
};

const loadProjectConfig = async (sessionId) => {
  if (projectConfigCache[sessionId]) {
    renderProjectConfigSection(sessionId, projectConfigCache[sessionId]);
    return;
  }
  try {
    const res = await fetch(`${API_BASE}/api/sessions/${sessionId}/project-config`);
    if (!res.ok) throw new Error('Failed');
    const data = await res.json();
    projectConfigCache[sessionId] = data;
    renderProjectConfigSection(sessionId, data);
  } catch (e) {
    const el = document.getElementById('dpProjectConfig');
    if (el && el.dataset.sessionId === sessionId) {
      el.innerHTML = '';
    }
  }
};

const renderProjectConfigSection = (sessionId, data) => {
  const el = document.getElementById('dpProjectConfig');
  if (!el || el.dataset.sessionId !== sessionId) return;

  const agentCount = data.agents ? data.agents.length : 0;
  const skillCount = data.skills ? data.skills.length : 0;

  if (agentCount === 0 && skillCount === 0 && !hasInstructions) {
    el.innerHTML = '';
    el.closest('.dp-section').style.display = 'none';

  html += `<div class="dp-pc-item"><span>${t('skills')}</span><span class="pc-count">${skillCount}</span></div>`;
  html += `<div class="dp-pc-item"><span>${t('copilotInstructions')}</span><span class="pc-check">${hasInstructions ? '✓' : '—'}</span></div>`;
  html += `<button class="dp-pc-detail-btn" onclick="openProjectConfigModal('${sessionId}')">${t('viewDetails')}</button>`;
  html += `</div>`;

  el.innerHTML = html;
};
